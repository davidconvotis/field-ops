name: ci-main-back

on:
  push:
    branches: [main]
    paths: ["backend/**"]

concurrency:
  group: ci-main-back
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fieldops-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate && npx prisma generate --schema=prisma/schema.test.prisma
      - run: npm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-dist-release
          path: backend/dist
          retention-days: 1 # transient — the permanent copy is the Release asset created below

  # Freezes `main`'s VERSION as the release tag, creates the GitHub Release,
  # then bumps `develop`'s VERSION to the next minor (research.md §1, FR-010b).
  # Guarded by a repo-wide `ci-main-back` concurrency group above so two
  # concurrent merges to `main` cannot race this job (spec.md analyze finding E1).
  tag-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.relver.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: relver
        run: echo "version=$(tr -d '[:space:]' < backend/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Fail closed if tag already exists (race guard)
        run: |
          TAG="backend-v${{ steps.relver.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists — refusing to overwrite (possible concurrent main merge race)"
            exit 1
          fi

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="backend-v${{ steps.relver.outputs.version }}"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-dist-release
          path: backend-dist-release

      - name: Package dist for the Release
        run: |
          cd backend-dist-release && zip -r ../backend-dist.zip . && cd ..

      - name: Create permanent GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: backend-v${{ steps.relver.outputs.version }}
          name: backend v${{ steps.relver.outputs.version }}
          files: backend-dist.zip

      - name: Bump develop's backend/VERSION to next minor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout -B develop origin/develop
          OLD=$(./scripts/bump-version.sh backend/VERSION)
          NEW=$(tr -d '[:space:]' < backend/VERSION)
          echo "Bumping develop backend/VERSION: $OLD -> $NEW"
          git add backend/VERSION
          git commit -m "chore: bump backend VERSION to $NEW [skip ci]"
          git push origin develop

  build-image:
    needs: tag-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push yet — scan before it ever reaches the registry)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ needs.tag-and-release.outputs.release_version }}
      - name: Scan image for critical vulnerabilities (FR-011/FR-011b)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.tag-and-release.outputs.release_version }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: ./.github/actions/ghcr-login
      - name: Push the scanned image
        run: docker push "${{ env.IMAGE_NAME }}:${{ needs.tag-and-release.outputs.release_version }}"

  deploy-pre:
    needs: [tag-and-release, build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy release image to pre
        run: ./scripts/deploy.sh pre backend "${{ needs.tag-and-release.outputs.release_version }}"
      - name: Health check pre
        id: health
        uses: ./.github/actions/health-check
        with:
          component: backend
          base_url: ${{ vars.PRE_BACKEND_URL }}
          environment: pre
      - name: Set up Node for the acceptance check
        if: steps.health.outcome == 'success'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Verify acceptance scenarios against the deployed API (FR-011c)
        id: acceptance
        if: steps.health.outcome == 'success'
        run: node scripts/check-aceptance.js --base-url "${{ vars.PRE_BACKEND_URL }}"
      - name: Record deployment
        if: always()
        uses: ./.github/actions/record-deployment
        with:
          environment: pre
          component: backend
          artifact_tag: ${{ needs.tag-and-release.outputs.release_version }}
          trigger: auto-deploy
          health_check_result: ${{ (steps.health.outcome == 'success' && steps.acceptance.outcome != 'failure') && 'pass' || 'fail' }}

  code-review-gate:
    needs: deploy-pre
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "All gates passed — ci-main-back certified (FR-022)"

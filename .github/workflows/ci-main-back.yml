name: CI Main — Backend

# Trigger: push de tag back-vX.Y.Z (creado por scripts/release-tag.sh back
# ANTES del merge a main — no un push genérico de rama, ver spec.md FR-009 /
# analyze findings C1/C2). CI completo + imagen semver final a GHCR +
# GitHub Release con dist como asset permanente.

on:
  push:
    tags:
      - "back-v*.*.*"

env:
  IMAGE: ghcr.io/${{ github.repository }}/fieldops-back

permissions:
  contents: read

jobs:
  ci:
    runs-on: self-hosted
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Regenerate Prisma clients for this runner (committed client is darwin-arm64)
        run: npm run prisma:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"       # back-vX.Y.Z
          echo "version=${TAG#back-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-backend-${{ steps.version.outputs.version }}
          path: backend/dist
          retention-days: 1 # solo puente hacia el job gh-release; el asset permanente vive en el Release

  push-image:
    needs: ci
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.ci.outputs.version }}

  gh-release:
    needs: ci
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-backend-${{ needs.ci.outputs.version }}
          path: dist
      - name: Compress dist (same build as ci job — no rebuild)
        run: tar -czf dist-backend-${{ needs.ci.outputs.version }}.tar.gz -C dist .
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Backend ${{ needs.ci.outputs.version }}"
          files: dist-backend-${{ needs.ci.outputs.version }}.tar.gz

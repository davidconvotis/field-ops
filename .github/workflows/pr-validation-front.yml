name: PR Validation — Frontend

# contracts/gates.md: lint+test, Gitleaks, guardián de Constitución,
# code-review dummy. Pin SHA (pipeline-constitution.md Principio I).

on:
  pull_request:
    branches: [develop]
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: self-hosted
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  gitleaks:
    needs: lint-test
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read # gitleaks-action's PR scan mode calls GET /pulls/:number/commits
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  constitution-guardian:
    needs: lint-test
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/constitution-guardian
        with:
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}

  code-review:
    needs: [gitleaks, constitution-guardian]
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Certify all frontend gates passed
        run: echo "Todas las gates de pr-validation-front.yml en verde — PR listo para revisión humana."

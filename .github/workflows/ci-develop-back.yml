name: CI Develop — Backend

# Merge a develop: CI completo + imagen snapshot a GHCR + dist como workflow
# artifact (90 días). FR-005/FR-006/FR-015.

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"

env:
  IMAGE: ghcr.io/${{ github.repository }}/fieldops-back

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Regenerate Prisma clients for this runner (committed client is darwin-arm64)
        run: npm run prisma:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Compute snapshot version
        id: version
        run: |
          BASE=$(tr -d '[:space:]' < VERSION)
          SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}-snapshot.${SHA}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-backend-${{ steps.version.outputs.version }}
          path: backend/dist
          retention-days: 90

  push-image:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.ci.outputs.version }}

  deploy:
    needs: [ci, push-image]
    runs-on: ubuntu-latest
    concurrency:
      group: dev-backend
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Deploy snapshot image to dev
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.DEV_BACKEND_RENDER_SERVICE_ID }}
        run: ./scripts/deploy.sh dev backend "${{ needs.ci.outputs.version }}"
      - name: Health check dev
        id: health
        uses: ./.github/actions/health-check
        with:
          component: backend
          base_url: ${{ vars.DEV_BACKEND_URL }}
          environment: dev
      - name: Record deployment
        if: always()
        uses: ./.github/actions/record-deployment
        with:
          environment: dev
          component: backend
          artifact_tag: ${{ needs.ci.outputs.version }}
          trigger: auto-deploy
          health_check_result: ${{ steps.health.outcome == 'success' && 'pass' || 'fail' }}

name: ci-develop-back

on:
  push:
    branches: [develop]
    paths: ["backend/**"]

concurrency:
  group: dev-backend
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fieldops-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate && npx prisma generate --schema=prisma/schema.test.prisma
      - run: npm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - id: version
        run: |
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-dist-${{ steps.version.outputs.short_sha }}
          path: backend/dist
          retention-days: 90

  build-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: tag
        run: echo "image_tag=${{ needs.build.outputs.version }}-snapshot.${{ needs.build.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push yet — scan before it ever reaches the registry)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
      - name: Scan image for critical vulnerabilities (FR-007/FR-008)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: ./.github/actions/ghcr-login
      - name: Push the scanned image
        run: docker push "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}"

  deploy-dev:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy snapshot image to dev
        run: ./scripts/deploy.sh dev backend "${{ needs.build-image.outputs.image_tag }}"
      - name: Health check dev
        id: health
        uses: ./.github/actions/health-check
        with:
          component: backend
          base_url: ${{ vars.DEV_BACKEND_URL }}
          environment: dev
      - name: Set up Node for the acceptance check
        if: steps.health.outcome == 'success'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Verify acceptance scenarios against the deployed API (FR-008b)
        id: acceptance
        if: steps.health.outcome == 'success'
        run: node scripts/check-aceptance.js --base-url "${{ vars.DEV_BACKEND_URL }}"
      - name: Record deployment
        if: always()
        uses: ./.github/actions/record-deployment
        with:
          environment: dev
          component: backend
          artifact_tag: ${{ needs.build-image.outputs.image_tag }}
          trigger: auto-deploy
          health_check_result: ${{ (steps.health.outcome == 'success' && steps.acceptance.outcome != 'failure') && 'pass' || 'fail' }}

  code-review-gate:
    needs: deploy-dev
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "All gates passed — ci-develop-back certified (FR-022)"

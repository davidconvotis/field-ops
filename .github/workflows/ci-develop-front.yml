name: ci-develop-front

on:
  push:
    branches: [develop]
    paths: ["frontend/**"]
  workflow_dispatch: {}

concurrency:
  group: dev-frontend
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fieldops-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - id: version
        run: |
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist-${{ steps.version.outputs.short_sha }}
          path: frontend/dist
          retention-days: 90

  build-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: tag
        run: echo "image_tag=${{ needs.build.outputs.version }}-snapshot.${{ needs.build.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push yet — scan before it ever reaches the registry)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
      - name: Scan image for critical vulnerabilities (FR-009/FR-010)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - uses: ./.github/actions/ghcr-login
      - name: Push the scanned image
        run: docker push "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}"

  deploy-dev:
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy snapshot image to dev
        run: ./scripts/deploy.sh dev frontend "${{ needs.build-image.outputs.image_tag }}"
      - name: Health check dev
        id: health
        uses: ./.github/actions/health-check
        with:
          component: frontend
          base_url: ${{ vars.DEV_FRONTEND_URL }}
          environment: dev
      - name: Record deployment
        if: always()
        uses: ./.github/actions/record-deployment
        with:
          environment: dev
          component: frontend
          artifact_tag: ${{ needs.build-image.outputs.image_tag }}
          trigger: auto-deploy
          health_check_result: ${{ steps.health.outcome == 'success' && 'pass' || 'fail' }}

  code-review-gate:
    needs: deploy-dev
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "All gates passed — ci-develop-front certified (FR-022)"

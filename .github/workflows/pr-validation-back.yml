name: PR Validation — Backend

# contracts/gates.md: lint+test, Spectral, oasdiff, Gitleaks,
# check-acceptance, Trivy, guardián de Constitución, code-review dummy.
# Pin SHA (pipeline-constitution.md Principio I) en toda Action externa.

on:
  pull_request:
    branches: [develop]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Regenerate Prisma clients for this runner (committed client is darwin-arm64)
        run: npm run prisma:generate
      - run: npm run lint
      - run: npm test

  spectral:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: stoplightio/spectral-action@a8cf48e40dfe41c9cb9e34ad1395262ee1e797ca # v0.8.10
        with:
          file_glob: "contracts/openapi.yaml"

  oasdiff:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Checkout base contract (develop)
        run: |
          git fetch origin develop --depth=1
          git show origin/develop:contracts/openapi.yaml > /tmp/base-openapi.yaml
      - uses: oasdiff/oasdiff-action/breaking@024f6c399f9a21ada1addb0f9a36ce1bfac995f1 # v0.1.6
        with:
          base: /tmp/base-openapi.yaml
          revision: contracts/openapi.yaml
          fail-on: ERR

  gitleaks:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action's PR scan mode calls GET /pulls/:number/commits
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-acceptance:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fieldops
          POSTGRES_PASSWORD: fieldops
          POSTGRES_DB: fieldops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://fieldops:fieldops@localhost:5432/fieldops
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci # NODE_ENV must NOT be production here — ts-node (seed) is a devDependency
      - run: npm run prisma:generate
      - run: npm run prisma:migrate
      - run: npm run seed
      - name: Start API in background
        env:
          NODE_ENV: production
        run: npm run build && node dist/src/api/app.js &
      - name: Wait for API
        run: npx wait-on http://localhost:3000/health -t 30000
      - run: node scripts/check-acceptance.js

  trivy:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build local image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          load: true
          push: false
          tags: fieldops-back:pr-scan
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fieldops-back:pr-scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  constitution-guardian:
    needs: lint-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/constitution-guardian
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  code-review:
    needs:
      [spectral, oasdiff, gitleaks, check-acceptance, trivy, constitution-guardian]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Certify all backend gates passed
        run: echo "Todas las gates de pr-validation-back.yml en verde — PR listo para revisión humana."

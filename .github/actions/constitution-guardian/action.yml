name: Constitution Guardian
description: >
  Invoca Claude Code Action para revisar el diff del PR contra
  .specify/memory/constitution.md y pipeline-constitution.md. Fail-closed:
  cualquier error (timeout, API caída) se trata como fallo de la gate, nunca
  como aprobación implícita (spec.md Edge Cases).

inputs:
  anthropic-api-key:
    description: API key de Anthropic (secrets.ANTHROPIC_API_KEY)
    required: true
  github-token:
    description: Token para que la action comente en el PR
    required: true

runs:
  using: composite
  steps:
    # timeout-minutes en el job que invoca esta action (no aquí) cubre el caso
    # de timeout/colgado — si el step no termina en el plazo del job, GitHub
    # Actions marca el job como failed, que es el comportamiento fail-closed
    # requerido (spec.md Edge Cases: timeout/error de red bloquea el merge).
    - name: Run Claude Code Action (constitution review)
      id: guardian
      uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1.0.173
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        github_token: ${{ inputs.github-token }}
        prompt: |
          Revisa el diff de este PR contra las reglas NON-NEGOTIABLE de
          .specify/memory/constitution.md y pipeline-constitution.md.
          Si encuentras una violación clara de un principio marcado
          NON-NEGOTIABLE o "DEBE", finaliza tu respuesta con la exit code
          distinta de cero explicando el principio violado. Si no hay
          violaciones, finaliza con éxito.
        # Default model selection (opus + 1M-context beta) failed instantly
        # (is_error:true, 0 cost, no result text) against this API key —
        # pin an explicit standard model instead.
        claude_args: |
          --model claude-sonnet-5
        show_full_output: "true"
      # Sin continue-on-error: cualquier fallo del step (API caída, timeout,
      # violación detectada) falla este job — fail-closed por defecto.
